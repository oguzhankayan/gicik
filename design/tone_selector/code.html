<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gıcık - Tone Selector</title>

                    "outline": "#948e9c",
                    "error": "#ffb4ab",
                    "on-tertiary-fixed-variant": "#594400",
                    "on-secondary": "#342b4b",
                    "on-surface-variant": "#cbc4d2",
                    "primary-container": "#6750a4",

                    "secondary-fixed": "#e9ddff",
                    "tertiary-fixed-dim": "#e7c365",

            "spacing": {

                    "stack_sm": "8px",
                    "edge_padding": "24px",
                    "stack_md": "20px"

            "fontFamily": {

                    "display-lg": [

                    "body-main": [

            "fontSize": {
                    "headline-md": [

                    ],
                    "display-lg": [

<style>
        body {
            background-color: #0A0612;
            color: #e6e0e9;
        }
        .holographic-border {
            border: 1px solid transparent;
            background: linear-gradient(#0A0612, #0A0612) padding-box,
                        linear-gradient(45deg, #FF0080, #CCFF00, #FF0080) border-box;
        }
        .glass-panel {
            background: rgba(26, 15, 46, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glow-active {
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.2);
        }
        .holographic-bg {
            background: linear-gradient(45deg, #FF0080, #CCFF00);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-main text-body-main pb-24">
<!-- TopAppBar -->
<header class="bg-[#1A0F2E]/70 backdrop-blur-md sticky top-0 z-50 border-b border-[#2D1B4E] shadow-[0_0_15px_rgba(255,0,128,0.1)]">
<div class="flex justify-between items-center w-full px-6 h-16">
<button class="text-slate-500 hover:text-[#FF0080] transition-colors duration-300 active:scale-95 transition-transform flex items-center gap-2">
<span class="material-symbols-outlined text-brand-lime drop-shadow-[0_0_5px_#CCFF00]">arrow_back</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest text-slate-500 hidden sm:inline-block">cevap &gt; ton seç</span>
</button>
<div class="font-['Space_Grotesk'] font-bold tracking-tighter uppercase text-[#CCFF00]">TONE_SELECTOR</div>
<div class="flex items-center gap-4">
<img alt="Screenshot preview" class="w-[60px] h-[80px] object-cover rounded border border-brand-dark-purple" data-alt="close up of a mobile messaging app screen with text bubbles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXBHvvnTRvWQv5Lo3ato45ROQG3_N7AZiQbkoDs57AQ6gLuxoeded1O7jY6fVP0J1trmIsrsSDqL-QlMSc1cbHefnhjcI7jaVbeRHmuHjOW8cDR0vmt0HRAjnSuXhz33TixBiVNRbevqnksjOfHLjxZmWm-Tn5aD2fIlCOGO1foufVq0YVSzkvdT0Sa3h6ZRnfQ5xWnqXYoGUNFHAZGenxznwYBVAq_zgn73gEgbCM33yOmM42AXeqf6OZPiHwcFxcl2cAsGu4NR0l"/>
<button class="text-slate-500 hover:text-[#FF0080] transition-colors duration-300 active:scale-95 transition-transform">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</div>
</header>
<main class="flex-grow px-edge_padding py-stack_md flex flex-col gap-stack_lg max-w-2xl mx-auto w-full">
<!-- Top Zone -->
<section class="flex flex-col gap-stack_md">
<h1 class="font-headline-md text-headline-md uppercase text-on-surface">NE TONDA<br/>KONUŞACAĞIZ?</h1>
<!-- Observation Card -->
<div class="glass-panel border border-brand-dark-purple rounded-[20px] p-4 flex gap-4 items-start">
<span class="material-symbols-outlined text-brand-pink mt-1">psychology</span>
<p class="font-technical-mono text-[15px] italic text-on-surface-variant lowercase leading-relaxed">
                    "konuşmaya bakınca sıcak çıkan bir hat var. flörtöz işler ama esprili daha güvenli."
                </p>
</div>
</section>
<!-- Tone Cards -->
<section class="flex flex-col gap-stack_sm">
<!-- Card 1: Flörtöz -->
<button class="w-full glass-panel border border-brand-dark-purple rounded-[20px] h-[80px] px-4 flex items-center justify-between hover:border-brand-pink transition-colors group text-left">
<div class="flex items-center gap-4">
<span class="text-2xl">💋</span>
<span class="font-headline-md text-[18px] uppercase tracking-wide group-hover:text-brand-pink transition-colors">FLÖRTÖZ</span>
</div>
<div class="font-technical-mono text-technical-mono text-white/60 lowercase truncate max-w-[50%]">
                    ima + cesaret + kapatıcı
                </div>
</button>
<!-- Card 2: Esprili (Active) -->
<button class="w-full glass-panel holographic-border glow-active rounded-[20px] h-[80px] px-4 flex items-center justify-between relative overflow-hidden text-left">
<!-- Active Lime Accent Line -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-lime"></div>
<div class="flex items-center gap-4 pl-2">
<span class="text-2xl">😏</span>
<div class="flex flex-col">
<span class="font-headline-md text-[18px] uppercase tracking-wide text-brand-lime">ESPRILI</span>
<div class="md:hidden font-technical-mono text-[11px] text-brand-lime border border-brand-lime rounded-full px-2 py-0.5 w-max mt-1 uppercase tracking-widest">
                            önerilen
                        </div>
</div>
</div>
<div class="flex items-center gap-3">
<div class="hidden md:block font-technical-mono text-[11px] text-brand-lime border border-brand-lime rounded-full px-2 py-0.5 uppercase tracking-widest">
                        önerilen
                    </div>
<div class="font-technical-mono text-technical-mono text-white/80 lowercase truncate max-w-[150px] md:max-w-[200px]">
                        zekayla flört, pun yok
                    </div>
</div>
</button>
<!-- Card 3: Direkt -->
<button class="w-full glass-panel border border-brand-dark-purple rounded-[20px] h-[80px] px-4 flex items-center justify-between hover:border-brand-pink transition-colors group text-left">
<div class="flex items-center gap-4">
<span class="text-2xl">🎯</span>
<span class="font-headline-md text-[18px] uppercase tracking-wide group-hover:text-brand-pink transition-colors">DİREKT</span>
</div>
<div class="font-technical-mono text-technical-mono text-white/60 lowercase truncate max-w-[50%]">
                    net, oyalamayan, saygılı
                </div>
</button>
<!-- Card 4: Sıcak -->
<button class="w-full glass-panel border border-brand-dark-purple rounded-[20px] h-[80px] px-4 flex items-center justify-between hover:border-brand-pink transition-colors group text-left">
<div class="flex items-center gap-4">
<span class="text-2xl">🤍</span>
<span class="font-headline-md text-[18px] uppercase tracking-wide group-hover:text-brand-pink transition-colors">SICAK</span>
</div>
<div class="font-technical-mono text-technical-mono text-white/60 lowercase truncate max-w-[50%]">
                    samimi, biraz vulnerable
                </div>
</button>
<!-- Card 5: Gizemli -->
<button class="w-full glass-panel border border-brand-dark-purple rounded-[20px] h-[80px] px-4 flex items-center justify-between hover:border-brand-pink transition-colors group text-left">
<div class="flex items-center gap-4">
<span class="text-2xl">🌑</span>
<span class="font-headline-md text-[18px] uppercase tracking-wide group-hover:text-brand-pink transition-colors">GİZEMLI</span>
</div>
<div class="font-technical-mono text-technical-mono text-white/60 lowercase truncate max-w-[50%]">
                    az veren, merak uyandıran
                </div>
</button>
</section>
</main>
<!-- Bottom Sticky Area -->
<div class="fixed bottom-0 left-0 w-full p-edge_padding bg-gradient-to-t from-[#0A0612] via-[#0A0612]/90 to-transparent z-40">
<div class="max-w-2xl mx-auto">
<button class="w-full holographic-bg text-black font-headline-md text-[18px] uppercase tracking-widest rounded-[16px] py-4 shadow-[0_0_20px_rgba(204,255,0,0.3)] active:scale-95 transition-transform">
                üret
            </button>
</div>
</div>
</body></html>
