<style>
        .holo-border {
            position: relative;
        }
        .holo-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(204, 255, 0, 0.4), rgba(255, 0, 128, 0.4), rgba(204, 255, 0, 0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .bg-cosmic {
            background-color: #0A0612;
        }
        .glow-pink {
            text-shadow: 0 0 15px rgba(255, 0, 128, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen text-on-background flex flex-col items-center justify-center p-edge_padding gap-stack_lg">
<!-- Small Widget (2x2) -->
<div class="flex flex-col items-center gap-stack_sm">
<h2 class="font-headline-md text-headline-md text-primary">Small Widget</h2>
<div class="w-[155px] h-[155px] bg-cosmic rounded-[22px] holo-border flex flex-col items-center justify-center p-4 cursor-pointer overflow-hidden relative">

<div class="absolute inset-0 bg-gradient-to-br from-[#1A0F2E]/30 to-transparent pointer-events-none"></div>
<div class="text-5xl mb-3 glow-pink relative z-10">🥀</div>

            </div>
</div>
</div>
<!-- Medium Widget (4x2) -->

<div class="w-[329px] h-[155px] bg-cosmic rounded-[22px] holo-border flex p-4 cursor-pointer overflow-hidden relative">
<!-- Background subtle gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-[#1A0F2E]/30 to-transparent pointer-events-none"></div>
<!-- Left Side -->
<div class="flex-1 flex flex-col items-center justify-center border-r border-white/10 pr-2 relative z-10">
<div class="text-4xl mb-2 glow-pink">🥀</div>
<div class="font-body-main text-[12px] leading-tight text-white/60 text-center line-clamp-2">

<button class="w-full h-[32%] bg-[#1A0F2E]/70 backdrop-blur-md rounded-[12px] border border-white/10 flex items-center justify-center font-headline-md text-[14px] text-white hover:bg-white/10 transition-colors">

<button class="w-full h-[32%] bg-[#1A0F2E]/70 backdrop-blur-md rounded-[12px] border border-white/10 flex items-center justify-center font-headline-md text-[14px] text-white hover:bg-white/10 transition-colors">
