<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gıcık - Demographics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-container-highest": "#36343a",
                        "on-secondary-container": "#bfb2da",
                        "on-primary": "#381e72",
                        "on-primary-fixed": "#22005d",
                        "on-secondary-fixed-variant": "#4b4263",
                        "surface-bright": "#3b383e",
                        "on-surface": "#e6e0e9",
                        "outline-variant": "#494551",
                        "on-background": "#e6e0e9",
                        "surface-container-low": "#1d1b20",
                        "background": "#141218",

                        "inverse-primary": "#6750a4",
                        "inverse-on-surface": "#322f35",

                        "primary-container": "#6750a4",

                        "on-secondary": "#342b4b",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    },
                    "spacing": {
                        "stack_sm": "8px",
                        "edge_padding": "24px",
                        "stack_md": "20px",
                        "stack_lg": "40px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "display-lg": ["Space Grotesk"],
                        "technical-mono": ["Inter"],
                        "headline-md": ["Space Grotesk"],
                        "body-main": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "technical-mono": ["13px", { "lineHeight": "1.4", "letterSpacing": "-0.02em", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "700" }],
                        "body-main": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]

                }
            }
        }

<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-main selection:bg-[#CCFF00] selection:text-black">
<!-- Suppressed TopAppBar & BottomNavBar as this is a linear onboarding flow -->
<!-- Top Bar: Progress -->
<header class="w-full px-edge_padding py-6 flex items-center justify-between sticky top-0 z-40 bg-surface/80 backdrop-blur-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full border border-[#2D1B4E] text-on-surface hover:text-[#CCFF00] transition-colors">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-1 rounded-full bg-[#CCFF00] shadow-[0_0_8px_rgba(204,255,0,0.5)]"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Canvas -->
<main class="flex-1 px-edge_padding pb-32 flex flex-col gap-stack_lg">
<!-- Header Section -->
<div class="flex flex-col gap-stack_sm mt-4">
<span class="font-technical-mono text-technical-mono text-[#CCFF00] tracking-wider uppercase">01 / KISA TANIŞMA</span>
<h1 class="font-headline-md text-headline-md text-on-surface uppercase leading-tight">ÖNCE BİRAZ<br/>TANIŞALIM</h1>
</div>
<!-- Question 1: Cinsiyet -->
<section class="flex flex-col gap-stack_md">
<h2 class="font-technical-mono text-technical-mono text-on-surface-variant uppercase tracking-widest border-b border-[#2D1B4E] pb-2">cinsiyet</h2>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 rounded-full border border-[#2D1B4E] font-technical-mono text-technical-mono lowercase text-on-surface bg-transparent hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">kadın</button>
<!-- Active State Example -->
<button class="px-6 py-3 rounded-full border border-[#CCFF00] font-technical-mono text-technical-mono lowercase text-[#CCFF00] bg-[#CCFF00]/10 shadow-[0_0_15px_rgba(204,255,0,0.15)] transition-all">erkek</button>
<button class="px-6 py-3 rounded-full border border-[#2D1B4E] font-technical-mono text-technical-mono lowercase text-on-surface bg-transparent hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">belirtmiyorum</button>
</div>
</section>
<!-- Question 2: Yaş -->
<section class="flex flex-col gap-stack_md">
<h2 class="font-technical-mono text-technical-mono text-on-surface-variant uppercase tracking-widest border-b border-[#2D1B4E] pb-2">yaş</h2>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 rounded-full border border-[#2D1B4E] font-technical-mono text-technical-mono lowercase text-on-surface bg-transparent hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">18-24</button>
<button class="px-6 py-3 rounded-full border border-[#2D1B4E] font-technical-mono text-technical-mono lowercase text-on-surface bg-transparent hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">25-34</button>
<!-- Active State Example -->
<button class="px-6 py-3 rounded-full border border-[#CCFF00] font-technical-mono text-technical-mono lowercase text-[#CCFF00] bg-[#CCFF00]/10 shadow-[0_0_15px_rgba(204,255,0,0.15)] transition-all">35-44</button>
<button class="px-6 py-3 rounded-full border border-[#2D1B4E] font-technical-mono text-technical-mono lowercase text-on-surface bg-transparent hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">45+</button>
</div>
</section>
<!-- Question 3: Ne Arıyorsun -->
<section class="flex flex-col gap-stack_md">
<h2 class="font-technical-mono text-technical-mono text-on-surface-variant uppercase tracking-widest border-b border-[#2D1B4E] pb-2">ne arıyorsun</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Card 1 -->
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-[20px] bg-[#1A0F2E]/70 border border-[#2D1B4E] backdrop-blur-[20px] hover:border-[#FF0080] transition-colors group">
<span class="text-3xl opacity-80 group-hover:opacity-100 transition-opacity">💖</span>
<span class="font-technical-mono text-technical-mono lowercase text-on-surface group-hover:text-[#FF0080] transition-colors">ilişki</span>
</button>
<!-- Card 2: Active State -->
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-[20px] bg-[#1A0F2E]/80 border border-transparent backdrop-blur-[20px] shadow-[0_0_20px_rgba(255,0,128,0.2)] relative overflow-hidden group">
<!-- Holographic border simulation via pseudo-element wrapper if CSS allowed, but here we use an inset div -->
<div class="absolute inset-0 border border-[#FF0080]/50 rounded-[20px] z-0"></div>
<div class="absolute inset-0 bg-gradient-to-br from-[#FF0080]/20 to-transparent z-0"></div>
<span class="text-3xl relative z-10">🔥</span>
<span class="font-technical-mono text-technical-mono lowercase text-[#FF0080] relative z-10">casual</span>
</button>
<!-- Card 3 -->
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-[20px] bg-[#1A0F2E]/70 border border-[#2D1B4E] backdrop-blur-[20px] hover:border-[#FF0080] transition-colors group">
<span class="text-3xl opacity-80 group-hover:opacity-100 transition-opacity">🎉</span>
<span class="font-technical-mono text-technical-mono lowercase text-on-surface group-hover:text-[#FF0080] transition-colors">eğlence</span>
</button>
<!-- Card 4 -->
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-[20px] bg-[#1A0F2E]/70 border border-[#2D1B4E] backdrop-blur-[20px] hover:border-[#FF0080] transition-colors group">
<span class="text-3xl opacity-80 group-hover:opacity-100 transition-opacity">💍</span>
<span class="font-technical-mono text-technical-mono lowercase text-on-surface group-hover:text-[#FF0080] transition-colors">birlikteyim</span>
</button>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-edge_padding bg-gradient-to-t from-surface via-surface to-transparent pb-[calc(24px+env(safe-area-inset-bottom))] z-40">
<button class="w-full h-14 rounded-[16px] bg-[#CCFF00] text-black font-headline-md text-[16px] uppercase tracking-wider flex items-center justify-center shadow-[0_0_20px_rgba(204,255,0,0.3)] hover:scale-[0.98] transition-transform">
            devam
        </button>
</div>
</body></html>
