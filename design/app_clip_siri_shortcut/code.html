<header class="flex items-center justify-between w-full">
<div class="flex items-baseline gap-1">
<span class="font-display-lg text-headline-md italic tracking-widest text-primary drop-shadow-[0_0_8px_rgba(207,188,255,0.5)]">gıcık</span>
<span class="w-2 h-2 rounded-full bg-tertiary shadow-[0_0_8px_rgba(231,195,101,0.8)]"></span>
</div>
<button aria-label="Close App Clip" class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">close</span>
</button>
</header>
<!-- Main Prompt -->
<section class="flex flex-col gap-stack_sm">
<h1 class="font-display-lg text-headline-md text-on-surface">
                Gıcık'tan<br/>cevap üret
            </h1>
<p class="font-technical-mono text-technical-mono text-outline">
                &gt; analyze_screenshot.exe --run
            </p>
</section>
<!-- Action Area: Screenshot Picker -->
<button class="w-full relative group overflow-hidden rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low hover:border-primary transition-all duration-300 flex flex-col items-center justify-center h-[180px] gap-stack_sm">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-2 group-hover:scale-110 transition-transform duration-300 border border-outline-variant group-hover:border-primary">
<span class="material-symbols-outlined text-primary" data-weight="fill">add_photo_alternate</span>
</div>
<span class="font-display-lg text-[14px] text-on-surface tracking-wider uppercase">Ekran Görüntüsü Yükle</span>
<span class="font-technical-mono text-technical-mono text-outline">PNG, JPG (Max 5MB)</span>
</button>
<!-- Secondary Action -->
<button class="w-full py-4 rounded-xl border border-outline-variant bg-surface-container flex items-center justify-center gap-3 hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">photo_library</span>
<span class="font-display-lg text-[14px] text-on-surface uppercase tracking-widest group-hover:text-primary transition-colors">fotoğraflardan seç</span>
</button>

<div class="w-1/3 h-1 bg-outline-variant rounded-full mx-auto mt-2 sm:hidden"></div>
