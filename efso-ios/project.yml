# xcodegen project spec
# Usage: brew install xcodegen && cd efso-ios && xcodegen generate
# Sonra: open Efso.xcodeproj

name: Efso
options:
  bundleIdPrefix: to.tikla
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr
  groupSortPosition: top
  generateEmptyDirectories: true
  swiftVersion: "6.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""        # Apple Developer Team ID buraya
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Debug.xcconfig
  Release: Release.xcconfig

targets:
  Efso:
    type: application
    platform: iOS
    sources:
      - path: Efso
    resources:
      - path: Efso/Resources
        excludes:
          - "design-source/**/*"   # design-source build'e dahil değil
    configFiles:
      Debug: Debug.xcconfig
      Release: Release.xcconfig
    info:
      path: Efso/Info.plist
      properties:
        CFBundleDisplayName: Efso
        # Version'ı build settings'ten al (project.yml MARKETING_VERSION).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        # iOS 17+ arm64-only.
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # TestFlight external testing için zorunlu.
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "mesaj ekran görüntülerini analiz etmek için fotoğraflara erişim."
        UIAppFonts:
          - SpaceGrotesk-VariableFont_wght.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
        # xcconfig'den gelen env vars (Debug.xcconfig / Release.xcconfig):
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        POSTHOG_HOST: $(POSTHOG_HOST)
        MIXPANEL_TOKEN: $(MIXPANEL_TOKEN)
        SENTRY_DSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: to.tikla.efso
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: $(inherited) -DDEBUG
          CODE_SIGN_ENTITLEMENTS: Efso/Efso.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Efso/Efso.Release.entitlements
    entitlements:
      path: Efso/Efso.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    dependencies:
      - package: Supabase
      - package: RevenueCat
      - package: PostHog
      - package: Sentry
      - package: Mixpanel
      - package: Lottie

  EfsoTests:
    type: bundle.unit-test
    platform: iOS
    sources: EfsoTests
    dependencies:
      - target: Efso

  EfsoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: EfsoUITests
    dependencies:
      - target: Efso

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.21.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.20.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.16.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.36.0
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift
    from: 4.3.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: 4.5.0

schemes:
  Efso:
    build:
      targets:
        Efso: all
        EfsoTests: [test]
        EfsoUITests: [test]
    test:
      targets: [EfsoTests, EfsoUITests]
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
