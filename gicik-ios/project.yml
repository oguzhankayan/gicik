# xcodegen project spec
# Usage: brew install xcodegen && cd gicik-ios && xcodegen generate
# Sonra: open Gicik.xcodeproj

name: Gicik
options:
  bundleIdPrefix: to.tikla
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr
  groupSortPosition: top
  generateEmptyDirectories: true
  swiftVersion: "6.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""        # Apple Developer Team ID buraya
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Debug.xcconfig
  Release: Release.xcconfig

targets:
  Gicik:
    type: application
    platform: iOS
    sources:
      - path: Gicik
    resources:
      - path: Gicik/Resources
        excludes:
          - "design-source/**/*"   # design-source build'e dahil değil
    configFiles:
      Debug: Debug.xcconfig
      Release: Release.xcconfig
    info:
      path: Gicik/Info.plist
      properties:
        CFBundleDisplayName: Gıcık
        # Version'ı build settings'ten al (project.yml MARKETING_VERSION).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        # iOS 17+ arm64-only; armv7 Apple build sistemi tarafından
        # "incompatible" sayar. Kaldırıldı (S1).
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # TestFlight external testing için zorunlu — encryption export
        # compliance declaration (S2). Sadece HTTPS standard cryption
        # kullanıyoruz; non-exempt yok.
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "mesaj ekran görüntülerini analiz etmek için fotoğraflara erişim."
        # NSCameraUsageDescription kaldırıldı (S7) — şu an kamera
        # kullanmıyoruz, "kullanmadığını söyleyen" purpose string'leri
        # Apple reddediyor. İleride gerekirse o zaman ekleyeceğiz.
        UIAppFonts:
          - SpaceGrotesk-VariableFont_wght.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
        # xcconfig'den gelen env vars (Debug.xcconfig / Release.xcconfig):
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        POSTHOG_HOST: $(POSTHOG_HOST)
        MIXPANEL_TOKEN: $(MIXPANEL_TOKEN)
        SENTRY_DSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: to.tikla.gicik
        CURRENT_PROJECT_VERSION: 1
        # 0.1.0 → 1.0.0 (App Store sürüm semantiği). Info.plist'te
        # $(MARKETING_VERSION) placeholder ile bu değer substitute olur.
        MARKETING_VERSION: "1.0.0"
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: $(inherited) -DDEBUG
          # Debug build'de development push environment.
          CODE_SIGN_ENTITLEMENTS: Gicik/Gicik.entitlements
        Release:
          # Release/TestFlight/App Store build'de production push.
          # `aps-environment = development` Production push'u sessizce
          # kırardı; her config'in kendi entitlements dosyası olmalı.
          CODE_SIGN_ENTITLEMENTS: Gicik/Gicik.Release.entitlements
    entitlements:
      path: Gicik/Gicik.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    dependencies:
      - package: Supabase
      - package: RevenueCat
      - package: PostHog
      - package: Sentry
      - package: Mixpanel
      - package: Lottie

  GicikTests:
    type: bundle.unit-test
    platform: iOS
    sources: GicikTests
    dependencies:
      - target: Gicik

  GicikUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: GicikUITests
    dependencies:
      - target: Gicik

packages:
  # Apple Privacy Manifest (PrivacyInfo.xcprivacy) ekleyen minimum sürümlere
  # pinleme. Eski sürümler manifest taşımıyor; submission'da Apple eksik
  # 3rd-party manifest uyarısı veriyor.
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.21.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.20.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.16.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.36.0
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift
    from: 4.3.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: 4.5.0

schemes:
  Gicik:
    build:
      targets:
        Gicik: all
        GicikTests: [test]
        GicikUITests: [test]
    test:
      targets: [GicikTests, GicikUITests]
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
