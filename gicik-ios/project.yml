# xcodegen project spec
# Usage: brew install xcodegen && cd gicik-ios && xcodegen generate
# Sonra: open Gicik.xcodeproj

name: Gicik
options:
  bundleIdPrefix: to.tikla
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr
  groupSortPosition: top
  generateEmptyDirectories: true
  swiftVersion: "6.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""        # Apple Developer Team ID buraya
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES

configs:
  Debug: debug
  Release: release

targets:
  Gicik:
    type: application
    platform: iOS
    sources:
      - path: Gicik
    resources:
      - path: Gicik/Resources
        excludes:
          - "design-source/**/*"   # design-source build'e dahil değil
    info:
      path: Gicik/Info.plist
      properties:
        CFBundleDisplayName: Gıcık
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [armv7]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSPhotoLibraryUsageDescription: "mesaj ekran görüntülerini analiz etmek için fotoğraflara erişim."
        NSCameraUsageDescription: "şu an kamera kullanmıyoruz; ileride."
        UIAppFonts:
          - SpaceGrotesk-VariableFont_wght.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
        # xcconfig'den gelen env vars (Debug.xcconfig / Release.xcconfig):
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        POSTHOG_HOST: $(POSTHOG_HOST)
        MIXPANEL_TOKEN: $(MIXPANEL_TOKEN)
        SENTRY_DSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: to.tikla.gicik
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: $(inherited) -DDEBUG
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    entitlements:
      path: Gicik/Gicik.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    dependencies:
      - package: Supabase
      - package: RevenueCat
      - package: PostHog
      - package: Sentry
      - package: Mixpanel
      - package: Lottie

  GicikTests:
    type: bundle.unit-test
    platform: iOS
    sources: GicikTests
    dependencies:
      - target: Gicik

  GicikUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: GicikUITests
    dependencies:
      - target: Gicik

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift
    from: 4.0.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: 4.0.0

schemes:
  Gicik:
    build:
      targets:
        Gicik: all
        GicikTests: [test]
        GicikUITests: [test]
    test:
      targets: [GicikTests, GicikUITests]
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
