project_id = "gicik"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = false  # MVP'de gerek yok

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "to.tikla.gicik://"
additional_redirect_urls = ["to.tikla.gicik://login-callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false  # Apple Sign In only

[auth.sms]
enable_signup = false

# Apple Sign In (production'da dashboard'da set edilir)
[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_SECRET)"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.calibrate]
verify_jwt = true

[functions.parse-screenshot]
verify_jwt = true

[functions.generate-replies]
verify_jwt = true

[functions.prompt-feedback]
verify_jwt = true

[functions.cleanup-storage]
verify_jwt = false  # cron'dan çağrılır, service-role bearer ile

[functions.revenuecat-webhook]
verify_jwt = false  # signature ile validate edilir

[experimental.webhooks]
enabled = true
